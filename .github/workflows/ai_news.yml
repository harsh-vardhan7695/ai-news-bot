name: AI News Pipeline

on:
  schedule:
    # Runs every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Restore the seen_items cache so we don't re-send old news
      - name: Restore seen items cache
        uses: actions/cache@v4
        with:
          path: seen_items.json
          key: seen-items-${{ github.run_id }}
          restore-keys: |
            seen-items-

      - name: Run AI News Pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SEEN_CACHE_FILE:    seen_items.json
        run: python news.py

      # Save updated cache after run
      - name: Save seen items cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_items.json
          key: seen-items-${{ github.run_id }}
